version: '3.8'

services:
  app:
    build: .
    container_name: api-jitterbit
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/jitterbit_db

  mongodb:
    image: mongo:latest
    container_name: mongodb-jitterbit
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: